# Cloudflare Tunnel overlay：与 docker-compose.cluster.yml 叠加使用（make up-cloudflare）。
# 作用：把 Caddy 改成明文 :80（TLS 由 Cloudflare 边缘出，不签证书、不开 443），并起 cloudflared
# 出站隧道——宿主零公网端口。域名在 Cloudflare 侧的 public hostname + 发布用的 IPFS_BASE_URL。
# 配置方法与架构见 docs/CLOUDFLARE_TUNNEL_DEPLOYMENT.md。
services:
  caddy:
    environment:
      # 覆盖：CF 模式下 Caddy 固定明文 :80（host-agnostic），不做自动 TLS。
      SITE_DOMAIN: ":80"
    # !override 替换(而非追加)base 的端口：CF 模式读路径全走隧道，不发布任何宿主读端口。
    # 写入口 9097 默认**仅绑回环**（不公网）——本机/同宿主的 Agent 用 127.0.0.1:9097 发布；
    # 远程 Agent 应走隧道 + Cloudflare Access service token（见 docs/CLOUDFLARE_ACCESS.md），
    # 而非把 9097 暴露公网。需连本机写入口也去掉可改 !reset []。
    ports: !override
      - "127.0.0.1:9097:9097"

  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    container_name: cl-cloudflared
    restart: unless-stopped
    depends_on: [caddy]
    # token 模式：在 Cloudflare Zero Trust 建 Tunnel 拿 token，写入 .env 的 CF_TUNNEL_TOKEN。
    # public hostname 指向 http://caddy:80（经 docker 内网，无需任何入站端口）。
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN:?set CF_TUNNEL_TOKEN in .env (见 docs/CLOUDFLARE_TUNNEL_DEPLOYMENT.md)}
